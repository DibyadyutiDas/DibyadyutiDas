name: Update README with Latest Repos

on:
  schedule:
    - cron: "0 0 * * *"  # Runs every day at midnight (UTC)
  workflow_dispatch:  # Allows manual execution

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch latest repositories
        uses: gautamkrishnar/blog-post-workflow@1.9.2
        with:
          commit_message: "Updated project list automatically"
          feed_list: "https://api.github.com/Dibyadyuti Das/dibyadyutidas/repos"
          template: "<tr><td><a href='{{link}}'><b>{{title}}</b></a></td><td>{{description}}</td><td>⭐ {{starCount}}</td></tr>"
          section_name: "📌 My Projects"
