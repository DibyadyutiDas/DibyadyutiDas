name: Update README with Latest Repos

on:
  schedule:
    - cron: "0 0 * * *"  # Runs every day at midnight (UTC)
  workflow_dispatch:  # Allows manual execution

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch latest repositories
        uses: lowlighter/metrics@latest
        with:
          filename: "github-metrics.svg"
          user: dibyadyutidas
          template: classic
          base: repositories
          repositories: 100  # Fetch up to 100 repos
          repositories_forks: yes  # Show forked repos
          repositories_affiliations: owner, collaborator
          config_order: repositories
          commit_message: "Updated project list automatically"
