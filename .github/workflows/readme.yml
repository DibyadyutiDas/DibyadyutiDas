name: Update README with Latest Repos

on:
  schedule:
    - cron: "0 0 * * *"  # Runs every day at midnight (UTC)
  workflow_dispatch:  # Allows manual execution

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch latest repositories
        uses: jakejarvis/github-actions-markdown-table@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          query: "https://api.github.com/users/dibyadyutidas/repos?sort=pushed&per_page=10"
          filename: "README.md"
          table_marker: "<!-- REPO-TABLE:START -->"
          columns: "name,description,language,stargazers_count,updated_at"
